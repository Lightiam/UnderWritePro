<!DOCTYPE html>
<html>
<head>
    <title>CreditScorePro AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/chat.css">
</head>
<body class="bg-white font-['Inter']">
    <!-- Top Banner -->
    <div class="bg-purple-600 text-white py-2 px-4 text-center text-sm">
        The Future of AI-Powered Credit Scoring →
    </div>
    
    <!-- Navigation -->
    <nav class="border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center">
                    <div class="text-purple-600 font-bold text-xl">CreditScorePro</div>
                </div>
                <div class="hidden md:flex items-center space-x-8">
                    <a href="#" class="text-slate-600 hover:text-slate-900">Product</a>
                    <a href="#" class="text-slate-600 hover:text-slate-900">Solutions</a>
                    <a href="#" class="text-slate-600 hover:text-slate-900">Responsible AI</a>
                    <a href="#" class="text-slate-600 hover:text-slate-900">Partners</a>
                    <a href="#" class="text-slate-600 hover:text-slate-900">Resources</a>
                    <button class="bg-purple-600 text-white px-4 py-2 rounded-md hover:bg-purple-700">Get Started</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <div class="chat-container">
        <div class="chat-header">
            <h1 class="text-2xl font-bold text-slate-800">CreditScorePro AI Assistant</h1>
        </div>
        
        <div id="messages-container" class="messages-container"></div>
        
        <div class="input-container">
            <input type="text" id="message-input" class="message-input" placeholder="Type your message...">
            <input type="file" id="file-upload" class="file-input">
            <button class="upload-button" onclick="document.getElementById('file-upload').click()">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                </svg>
            </button>
            <button id="send-button" class="send-button">Send</button>
        </div>
    </div>

        <!-- Credit Score Form (Hidden Initially) -->
        <div id="formSection" class="hidden mt-16 max-w-2xl mx-auto bg-white p-8 rounded-lg shadow-lg">
            <h2 class="text-2xl font-bold mb-6 text-slate-800">Calculate Credit Score</h2>
            <form id="predictionForm" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700">Annual Income ($)</label>
                        <input type="number" name="income" required class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-purple-500 focus:ring-purple-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700">Age</label>
                        <input type="number" name="age" required min="18" max="100" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-purple-500 focus:ring-purple-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700">Employment Length (years)</label>
                        <input type="number" name="employment_length" required min="0" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-purple-500 focus:ring-purple-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700">Debt to Income Ratio</label>
                        <input type="number" name="debt_to_income" required step="0.01" min="0" max="1" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-purple-500 focus:ring-purple-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700">Number of Credit Lines</label>
                        <input type="number" name="num_credit_lines" required min="0" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-purple-500 focus:ring-purple-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700">Payment History Score (0-1)</label>
                        <input type="number" name="payment_history" required step="0.01" min="0" max="1" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-purple-500 focus:ring-purple-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700">Loan Amount ($)</label>
                        <input type="number" name="loan_amount" required class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-purple-500 focus:ring-purple-500">
                    </div>
                </div>
                
                <div class="mt-6">
                    <button type="submit" class="w-full bg-purple-600 text-white py-3 px-4 rounded-md hover:bg-purple-700 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:ring-offset-2 font-semibold">
                        Calculate Score
                    </button>
                </div>
            </form>
            
            <div id="result" class="mt-6 hidden">
                <div class="p-6 bg-slate-50 rounded-lg text-center">
                    <h2 class="text-xl font-semibold text-slate-800 mb-2">Predicted Credit Score</h2>
                    <p id="creditScore" class="text-5xl font-bold text-purple-600"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/chat.js"></script>
</body>
</html>
