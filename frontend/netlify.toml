[build]
  command = "npm run build"
  publish = "out"
  
[build.environment]
  NEXT_PUBLIC_API_URL = "https://lendify-ai-api.netlify.app/.netlify/functions/api"
  NODE_VERSION = "18"
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

[[redirects]]
  from = "/chat"
  to = "/chat/index.html"
  status = 200

[[redirects]]
  from = "/chat/*"
  to = "/chat/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
