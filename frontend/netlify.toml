[build]
  command = "npm run build"
  publish = "out"
  
[build.environment]
  NEXT_PUBLIC_API_URL = "https://lendify-ai-api.netlify.app/.netlify/functions/api"
  NODE_VERSION = "18"
  NPM_FLAGS = "--legacy-peer-deps"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true
